<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DamGrooves — Coming Soon</title>
<meta name="description" content="DamGrooves — drummer site coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --text: #e8e6e3;
    --text-dim: #8a8a8a;
    --red: #c41e2a;
    --red-bright: #e8313f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .eq {
    display: flex;
    align-items: flex-end;
    gap: 5px;
    height: 32px;
    margin-bottom: 28px;
  }
  .eq span {
    width: 5px;
    background: var(--red);
    animation: eq 1.1s ease-in-out infinite;
    transform-origin: bottom;
  }
  .eq span:nth-child(1) { height: 40%; animation-delay: 0s; }
  .eq span:nth-child(2) { height: 70%; animation-delay: 0.15s; }
  .eq span:nth-child(3) { height: 100%; animation-delay: 0.3s; background: var(--red-bright); }
  .eq span:nth-child(4) { height: 55%; animation-delay: 0.45s; }
  .eq span:nth-child(5) { height: 85%; animation-delay: 0.6s; }
  @keyframes eq {
    0%, 100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .eq span { animation: none; height: 60% !important; }
  }
  h1 {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    font-size: clamp(2.2rem, 7vw, 3.6rem);
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  h1 .accent { color: var(--red-bright); }
  p.tagline {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    font-size: clamp(0.85rem, 2vw, 1rem);
    margin-top: 18px;
  }
  .contact {
    margin-top: 40px;
    font-size: 0.9rem;
  }
  .contact a {
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px solid #262626;
    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .contact a:hover {
    color: var(--red-bright);
    border-color: var(--red-bright);
  }
</style>
</head>
<body>
  <div class="eq" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <h1>DAM<span class="accent">GROOVES</span></h1>
  <p class="tagline">Drummer Site — Coming Soon</p>
  <div class="contact">
    Get in touch: <a href="mailto:damgrooves@gmail.com">damgrooves@gmail.com</a>
  </div>
</body>
</html>
